spring.application.name=freshlink
spring.profiles.default=dev

# Actuator exposure
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.default-schema=freshlink
spring.flyway.schemas=freshlink
spring.flyway.create-schemas=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=freshlink

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.default-produces-media-type=application/json

# FreshLink auth
freshlink.auth.jwt.issuer=freshlink
freshlink.auth.jwt.expiration=PT24H
freshlink.auth.jwt.secret=${FRESHLINK_JWT_SECRET:change-me-change-me-change-me-change-me}
freshlink.auth.google.client-id=${GOOGLE_CLIENT_ID:}
freshlink.auth.allowed-emails=${FRESHLINK_ALLOWED_EMAILS:julien.burlereaux@gmail.com}
