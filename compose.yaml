services:
  postgres:
    image: postgres:18-alpine
    container_name: freshlink-postgres
    environment:
      POSTGRES_DB: freshlink
      POSTGRES_USER: freshlink
      POSTGRES_PASSWORD: freshlink
    ports:
      - "5432:5432"
    volumes:
      - freshlink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshlink -d freshlink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  freshlink_pgdata:
